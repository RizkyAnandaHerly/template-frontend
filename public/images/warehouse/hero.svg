<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090d16" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#09090a" />
    </linearGradient>
    <radialGradient id="r2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFDD00" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#FFDD00" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#g2)" />
  <circle cx="400" cy="300" r="350" fill="url(#r2)" />
  
  <!-- Dashboard Screen Group -->
  <g transform="translate(40, 20)">
    <!-- Main screen frame -->
    <rect x="60" y="60" width="600" height="440" rx="16" fill="#09090A" stroke="rgba(255,255,255,0.08)" stroke-width="2" />
    <!-- OS Top header bar -->
    <rect x="60" y="60" width="600" height="28" rx="0" fill="#111827" />
    <circle cx="85" cy="74" r="5" fill="#EF4444" />
    <circle cx="97" cy="74" r="5" fill="#F59E0B" />
    <circle cx="109" cy="74" r="5" fill="#10B981" />
    
    <!-- Sidebar navigation -->
    <rect x="60" y="88" width="130" height="412" rx="0" fill="#111827" />
    <!-- Sidebar items -->
    <rect x="75" y="115" width="100" height="25" rx="6" fill="rgba(255,221,0,0.08)" stroke="rgba(255,221,0,0.2)" stroke-width="1" />
    <text x="90" y="131" fill="#FFDD00" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">Dashboard</text>
    
    <text x="90" y="171" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Inbounds</text>
    <text x="90" y="211" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Stock Items</text>
    <text x="90" y="251" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Locations</text>
    <text x="90" y="291" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Settings</text>
    
    <!-- Main content dashboard area -->
    <!-- Top banner title -->
    <text x="210" y="125" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">Internal Warehouse Control</text>
    <text x="210" y="142" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="9">System Overview &amp; Stock Levels</text>
    
    <!-- Cards row -->
    <!-- Card 1 -->
    <rect x="210" y="165" width="135" height="65" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
    <text x="225" y="185" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="8" font-weight="600" letter-spacing="0.5">TOTAL ITEMS</text>
    <text x="225" y="215" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">14,284</text>
    
    <!-- Card 2 -->
    <rect x="360" y="165" width="135" height="65" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
    <text x="375" y="185" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="8" font-weight="600" letter-spacing="0.5">ACTIVE RACKS</text>
    <text x="375" y="215" fill="#FFDD00" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">82% Full</text>
    
    <!-- Card 3 -->
    <rect x="510" y="165" width="135" height="65" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
    <text x="525" y="185" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="8" font-weight="600" letter-spacing="0.5">DAILY MOVES</text>
    <text x="525" y="215" fill="#4ADE80" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">1,894</text>
    
    <!-- Visual Chart Card -->
    <rect x="210" y="245" width="435" height="235" rx="10" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
    <text x="230" y="275" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">Stock Volume Activity Track</text>
    
    <!-- Chart Graph lines -->
    <!-- Axis -->
    <line x1="240" y1="440" x2="615" y2="440" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
    <line x1="240" y1="300" x2="240" y2="440" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
    <!-- Grid -->
    <line x1="240" y1="350" x2="615" y2="350" stroke="rgba(255,255,255,0.03)" stroke-dasharray="3" stroke-width="1" />
    <line x1="240" y1="400" x2="615" y2="400" stroke="rgba(255,255,255,0.03)" stroke-dasharray="3" stroke-width="1" />
    <!-- Smooth Path vector -->
    <path d="M240,430 Q280,390 320,410 T400,320 T480,360 T560,300 T615,310" fill="none" stroke="#FFDD00" stroke-width="2.5" />
    <!-- Glowing shadow of the path -->
    <path d="M240,430 Q280,390 320,410 T400,320 T480,360 T560,300 T615,310" fill="none" stroke="#FFDD00" stroke-width="8" opacity="0.12" />
    
    <path d="M240,440 L240,430 Q280,390 320,410 T400,320 T480,360 T560,300 T615,310 L615,440 Z" fill="rgba(255,221,0,0.01)" />
  </g>
</svg>
