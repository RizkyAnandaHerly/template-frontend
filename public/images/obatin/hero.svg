<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#09090a" />
    </linearGradient>
    <radialGradient id="r1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5e94b3" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#5e94b3" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#g1)" />
  <circle cx="400" cy="300" r="300" fill="url(#r1)" />
  
  <!-- UI Mockup Group -->
  <g transform="translate(0, 0)">
    <!-- Phone body -->
    <rect x="280" y="60" width="240" height="460" rx="36" fill="#09090A" stroke="rgba(255,255,255,0.12)" stroke-width="3" />
    <!-- Dynamic Island / Speaker notch -->
    <rect x="350" y="75" width="100" height="24" rx="12" fill="#000000" />
    <!-- Screen -->
    <rect x="295" y="110" width="210" height="390" rx="22" fill="#0B0F19" />
    
    <!-- App UI Inside -->
    <!-- App Title bar -->
    <text x="400" y="145" fill="#FFFFFF" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" letter-spacing="1">ObatIn</text>
    
    <!-- Heart Icon Circle -->
    <circle cx="400" cy="210" r="35" fill="rgba(94,148,179,0.15)" stroke="rgba(94,148,179,0.3)" stroke-width="1" />
    <path d="M400,223 C395,217 384,209 384,198 C384,188 392,183 400,192 C408,183 416,188 416,198 C416,209 405,217 400,223 Z" fill="#FFDD00" transform="translate(0, -2)" />
    
    <!-- Medication title -->
    <text x="400" y="275" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Dad's Heart Pill</text>
    <text x="400" y="293" fill="rgba(255,255,255,0.4)" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle">Reminds at 08:00 AM</text>
    
    <!-- Family Recording Voice capsule -->
    <rect x="315" y="320" width="170" height="50" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
    <!-- Voice play button -->
    <circle cx="345" cy="345" r="14" fill="#FFDD00" />
    <path d="M342,339 L351,345 L342,351 Z" fill="#000000" />
    <!-- Voice wave visual -->
    <rect x="375" y="342" width="4" height="6" rx="2" fill="rgba(255,255,255,0.6)" />
    <rect x="383" y="338" width="4" height="14" rx="2" fill="#5E94B3" />
    <rect x="391" y="335" width="4" height="20" rx="2" fill="#5E94B3" />
    <rect x="399" y="339" width="4" height="12" rx="2" fill="#5E94B3" />
    <rect x="407" y="341" width="4" height="8" rx="2" fill="rgba(255,255,255,0.6)" />
    <rect x="415" y="343" width="4" height="4" rx="2" fill="rgba(255,255,255,0.6)" />
    <text x="440" y="349" fill="rgba(255,255,255,0.7)" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">0:08</text>
    
    <!-- Escalation Active Indicator -->
    <rect x="315" y="385" width="170" height="45" rx="14" fill="rgba(94,148,179,0.08)" stroke="rgba(94,148,179,0.2)" stroke-width="1" />
    <circle cx="340" cy="407" r="6" fill="#4ADE80" />
    <text x="357" y="411" fill="rgba(255,255,255,0.8)" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="500">Escalation Group Active</text>
    
    <!-- Bottom tap area -->
    <rect x="315" y="445" width="170" height="35" rx="12" fill="#5e94b3" opacity="0.9" />
    <text x="400" y="466" fill="#09090A" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" text-anchor="middle">TAKE MEDICINE</text>
  </g>
</svg>
